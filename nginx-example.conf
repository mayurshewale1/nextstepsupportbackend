# Example nginx reverse proxy for NextStep API
# Copy to /etc/nginx/sites-available/ and enable, or include in your existing config.
#
# Fix for 413 Payload Too Large when uploading complaint images:
#   client_max_body_size 10M;

server {
    listen 80;
    server_name nextstep.mayurr.in;

    # IMPORTANT: Allow uploads up to 10MB (complaint images)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # If using HTTPS (Let's Encrypt, etc.):
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/nextstep.mayurr.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nextstep.mayurr.in/privkey.pem;
}
